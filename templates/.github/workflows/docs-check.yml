name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run docs checks
        run: |
          make tools-check
          make docs-check
          make docs-status ARGS='--compact'
